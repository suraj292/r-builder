# Nginx Configuration Template for ResumeBP
# -------------------------------------------------------------
# Place this configuration in your Nginx sites-available directory
# (e.g., /etc/nginx/sites-available/resumebp) and symlink it to sites-enabled.
# Adjust SSL certificates and paths according to CloudPanel or your own CA.

# 1. FRONTEND: resumebp.com & www.resumebp.com
server {
    listen 80;
    listen [::]:80;
    server_name resumebp.com www.resumebp.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://resumebp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.resumebp.com;

    # SSL Configuration (Replace with actual paths)
    ssl_certificate /etc/letsencrypt/live/resumebp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resumebp.com/privkey.pem;

    # Redirect www to non-www
    return 301 https://resumebp.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name resumebp.com;

    # SSL Configuration (Replace with actual paths or CloudPanel paths)
    ssl_certificate /etc/letsencrypt/live/resumebp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resumebp.com/privkey.pem;

    # Web Root containing built static files
    root /home/resumebp/htdocs/resumebp.com;
    index index.html;

    # Log Locations
    access_log /home/resumebp/logs/nginx/resumebp.access.log;
    error_log /home/resumebp/logs/nginx/resumebp.error.log;

    # Handle SPA routing (fallback to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy block to route /api requests to FastAPI backend
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Assets Caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Optional: Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# 2. BACKEND API: api.resumebp.com
server {
    listen 80;
    listen [::]:80;
    server_name api.resumebp.com;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://api.resumebp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.resumebp.com;

    # SSL Configuration (Replace with actual paths or CloudPanel paths)
    ssl_certificate /etc/letsencrypt/live/api.resumebp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.resumebp.com/privkey.pem;

    # Log Locations
    access_log /home/resumebp/logs/nginx/api.access.log;
    error_log /home/resumebp/logs/nginx/api.error.log;

    # Root redirect back to the main site
    location = / {
        return 301 https://resumebp.com;
    }

    # Proxy all other requests to the FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
